kind = "web"
previewPath = "/"
title = "Al Bayaan AI Quran"
version = "1.0.0"
id = "artifacts/al-bayaan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 8081

[services.development]
run = "pnpm --filter @workspace/al-bayaan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/al-bayaan", "run", "build" ]
publicDir = "artifacts/al-bayaan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8081"
BASE_PATH = "/"
